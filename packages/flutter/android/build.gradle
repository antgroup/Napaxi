// Napaxi SDK - Android build configuration
// Uses cargo-ndk to cross-compile Rust code for Android targets.

group 'com.napaxi.flutter'
version '1.0'

apply plugin: 'com.android.library'
// Built-in Kotlin migration (supporting Flutter < 3.44): apply KGP only on
// AGP < 9, where Kotlin support is not yet built in. On AGP 9.0+ the Kotlin
// plugin is provided automatically, so applying it would fail.
def agpMajor = com.android.Version.ANDROID_GRADLE_PLUGIN_VERSION.tokenize('.')[0] as int
if (agpMajor < 9) {
    apply plugin: 'org.jetbrains.kotlin.android'
}

android {
    namespace 'com.napaxi.flutter'
    compileSdk 35

    defaultConfig {
        minSdk 26
        targetSdk 35
    }

    buildFeatures {
        aidl true
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    sourceSets {
        main {
            manifest.srcFile 'AndroidManifest.xml'
            java.srcDirs = ['src/main/kotlin']
            aidl.srcDirs = ['src/main/aidl']
            res.srcDirs = ['res']
            assets.srcDirs = ['assets']
            jniLibs.srcDirs = ['jniLibs']
        }
    }
}

kotlin {
    compilerOptions {
        jvmTarget = org.jetbrains.kotlin.gradle.dsl.JvmTarget.JVM_17
    }
}

dependencies {
    compileOnly 'androidx.core:core:1.13.0'
}

def resolveWindowsBashPath(Project project) {
    def candidates = []
    def normalizeCandidatePath = { String path ->
        def normalized = path.trim()
        if (normalized.length() >= 2 && normalized.startsWith('"') && normalized.endsWith('"')) {
            return normalized.substring(1, normalized.length() - 1)
        }
        normalized
    }
    def addCandidate = { String path ->
        if (path != null && !path.trim().isEmpty()) {
            candidates << normalizeCandidatePath(path)
        }
    }

    addCandidate(System.getenv("NAPAXI_BASH"))

    def collectWhereResults = { String executable ->
        try {
            def output = new ByteArrayOutputStream()
            project.exec {
                commandLine "where.exe", executable
                standardOutput = output
                errorOutput = new ByteArrayOutputStream()
                ignoreExitValue = true
            }
            output.toString("UTF-8")
                .readLines()
                .collect { it.trim() }
                .findAll { !it.isEmpty() }
                .each(addCandidate)
        } catch (Exception ignored) {
        }
    }

    collectWhereResults("bash")

    def gitPaths = []
    try {
        def output = new ByteArrayOutputStream()
        project.exec {
            commandLine "where.exe", "git"
            standardOutput = output
            errorOutput = new ByteArrayOutputStream()
            ignoreExitValue = true
        }
        gitPaths = output.toString("UTF-8")
            .readLines()
            .collect { it.trim() }
            .findAll { !it.isEmpty() }
    } catch (Exception ignored) {
    }

    gitPaths.each { gitPath ->
        def gitExe = project.file(gitPath)
        def gitRoot = gitExe.parentFile?.parentFile
        if (gitRoot != null) {
            addCandidate(new File(gitRoot, "bin/bash.exe").path)
            addCandidate(new File(gitRoot, "usr/bin/bash.exe").path)
        }
    }

    [
        System.getenv("ProgramFiles"),
        System.getenv("ProgramFiles(x86)")
    ].findAll { it != null && !it.trim().isEmpty() }
        .each { root ->
            addCandidate(new File(root, "Git/bin/bash.exe").path)
            addCandidate(new File(root, "Git/usr/bin/bash.exe").path)
        }

    def localAppData = System.getenv("LocalAppData")
    if (localAppData != null && !localAppData.trim().isEmpty()) {
        addCandidate(new File(localAppData, "Programs/Git/bin/bash.exe").path)
        addCandidate(new File(localAppData, "Programs/Git/usr/bin/bash.exe").path)
    }

    def windowsDir = System.getenv("WINDIR") ?: "C:/Windows"
    def windowsBash = project.file("${windowsDir}/System32/bash.exe")
    def windowsBashPath = windowsBash.exists() ? windowsBash.canonicalPath : null

    def bashPath = candidates
        .collect { project.file(it) }
        .find { candidate ->
            candidate.exists() &&
                candidate.name.equalsIgnoreCase("bash.exe") &&
                (windowsBashPath == null || !candidate.canonicalPath.equalsIgnoreCase(windowsBashPath))
        }

    if (bashPath == null) {
        throw new GradleException("No usable Git Bash executable found for tools/scripts/build.sh. Set NAPAXI_BASH to your Git Bash path.")
    }

    bashPath.absolutePath
}

task verifySdkNativeInputs {
    doLast {
        def androidMain = file("${project.projectDir}")
        def requiredFiles = [
            file("${androidMain}/assets/alpine-rootfs.bin"),
            file("${androidMain}/assets/libtalloc.so.2"),
            file("${androidMain}/jniLibs/arm64-v8a/libproot.so"),
            file("${androidMain}/jniLibs/arm64-v8a/libldmusl.so"),
            file("${androidMain}/jniLibs/arm64-v8a/libloader.so"),
        ]
        requiredFiles.each { requiredFile ->
            if (!requiredFile.exists()) {
                throw new GradleException("Missing Napaxi SDK platform runtime asset: ${requiredFile}")
            }
        }
    }
}

// Rust cross-compilation task
// Builds libnapaxi_api_bridge.so for Android targets using the repository build script.
// Skipped when pre-built .so already exists; run tools/scripts/build.sh to rebuild.
task buildRust(type: Exec) {
    def soFile = file("${project.projectDir}/jniLibs/arm64-v8a/libnapaxi_api_bridge.so")
    onlyIf { !soFile.exists() }
    dependsOn verifySdkNativeInputs
    def repoRoot = file("${project.projectDir}/../../..")
    workingDir repoRoot
    def buildScript = file("${repoRoot}/tools/scripts/build.sh")
    if (org.gradle.internal.os.OperatingSystem.current().isWindows()) {
        doFirst {
            commandLine resolveWindowsBashPath(project), buildScript.absolutePath, "fast", "android"
        }
    } else {
        commandLine buildScript.absolutePath, "fast", "android"
    }
}

task verifySdkNativeOutputs {
    dependsOn buildRust
    doLast {
        def soFile = file("${project.projectDir}/jniLibs/arm64-v8a/libnapaxi_api_bridge.so")
        if (!soFile.exists()) {
            throw new GradleException("Missing Napaxi SDK Android library: ${soFile}")
        }
    }
}

// Hook into Android build
preBuild.dependsOn verifySdkNativeOutputs
