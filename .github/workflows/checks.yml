name: checks

on:
  push:
    branches: [master, init/napaxi-open-source-structure]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  checks:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@b3b07ba9c2c5a4ad8f2ada6a19be289c9b5b8432 # v1
        with:
          toolchain: "1.92"
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@9d47c6ad4b02e050fd481d16490c35cc678b9d45 # v2.7.8

      - name: Install ripgrep
        run: sudo apt-get update && sudo apt-get install -y ripgrep

      - name: check-boundary
        run: ./tools/scripts/build.sh check-boundary

      - name: check-hygiene
        run: ./tools/scripts/build.sh check-hygiene

      - name: check-test-stability
        run: ./tools/scripts/build.sh check-test-stability