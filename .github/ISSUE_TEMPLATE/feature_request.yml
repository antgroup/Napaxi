name: Feature request
description: Propose a new Napaxi capability, API, or improvement.
title: "[feat] <short description>"
labels: ["enhancement", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting an improvement.

        New cross-cutting features (LLM providers, built-in tools, platform
        tools, MCP surfaces, policy hooks, background services) should be
        modelled as capabilities. See
        [`docs/mobile-capabilities.md`](../../docs/mobile-capabilities.md).
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What use case is currently painful or impossible?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed direction
      description: Sketch of API surface, capability shape, or runtime change.
    validations:
      required: true
  - type: dropdown
    id: surface
    attributes:
      label: Likely affected component
      multiple: true
      options:
        - Core (crates/core)
        - Feature crate (crates/features)
        - Bridge (packages/api_bridge)
        - Flutter SDK (packages/flutter)
        - Agent Provider (packages/agent_provider)
        - Build / scripts
        - Docs
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you weighed, and why this one is preferable.
  - type: textarea
    id: notes
    attributes:
      label: Additional context
